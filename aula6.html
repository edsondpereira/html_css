<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Método GET</title>
</head>
<body>
    <h1>FORMULÁRIO - MÉTODO GET</h1>
    <p>
        O método <strong>GET</strong> envia os dados pela <strong>URL</strong> (<em>visíveis na barra de endereço</em>)
    </p>
    <form>
        <p>
            <label for="nome">Nome:</label><br>
            <input type="text" name="nome" required placeholder="Por favor, informe o nome completo do indivíduo" size="50" maxlength="40">
        </p>
        <p>
            <label for="idade">Idade:</label><br>
            <input type="number" name="idade" min="1" max="150" required>
        </p>
        <p>
            <label for="salario">Salário:</label><br>
            <input type="number" name="salario" step="0.01" required>
        </p>
        <p>
            <input type="submit" name="enviar" value="Enviar">
            <input type="reset" name="limpar" value="Limpar">
        </p>
    </form>
</body>
</html>
